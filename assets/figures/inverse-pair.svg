<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Diagram: total accumulated and rate of change linked by two arrows, differentiate and integrate, each undoing the other.">
<rect width="680" height="300" fill="none"/>
<defs><marker id="arrow-inverse" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#274b6d"/></marker></defs>
<rect x="50" y="100" width="230" height="100" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="121.0" y="128.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">HOW MUCH</text>
<text x="165.0" y="158.0" font-size="16" font-weight="600" text-anchor="middle" fill="#17181b">Total accumulated</text>
<text x="165.0" y="180.0" font-size="13" text-anchor="middle" fill="#6a6d73">(the integral)</text>
<rect x="400" y="100" width="230" height="100" rx="8" fill="#ffffff" stroke="#cfcdc4"/>
<text x="471.0" y="128.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">HOW FAST</text>
<text x="515.0" y="158.0" font-size="16" font-weight="600" text-anchor="middle" fill="#17181b">Rate of change</text>
<text x="515.0" y="180.0" font-size="13" text-anchor="middle" fill="#6a6d73">(the derivative)</text>
<path d="M 286 126 C 320 78, 360 78, 394 126" fill="none" stroke="#274b6d" stroke-width="2" marker-end="url(#arrow-inverse)"/>
<text x="340" y="70" font-size="13" font-weight="600" text-anchor="middle" fill="#274b6d">differentiate</text>
<path d="M 394 174 C 360 234, 320 234, 286 174" fill="none" stroke="#274b6d" stroke-width="2" marker-end="url(#arrow-inverse)"/>
<text x="340" y="230" font-size="13" font-weight="600" text-anchor="middle" fill="#274b6d">integrate</text>
<text x="340" y="278" font-size="13" text-anchor="middle" fill="#3b3d42">each undoes the other</text>
</svg>