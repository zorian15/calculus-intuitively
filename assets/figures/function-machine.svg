<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Function machine: input 3 enters the rule f of x equals 2x plus 1 and output 7 leaves.">
<defs><marker id="fm-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b3d42"/></marker></defs>
<rect x="0" y="0" width="560" height="340" fill="none"/>
<text x="30.0" y="40.0" font-size="11" font-weight="700" fill="#6a6d73" letter-spacing="1">A FUNCTION IS A MACHINE</text>
<rect x="30.0" y="104.0" width="92.0" height="52.0" rx="6" fill="#ffffff" stroke="#cfcdc4"/>
<text x="76.0" y="135.2" font-size="15" font-weight="600" text-anchor="middle" fill="#17181b">input 3</text>
<line x1="126" y1="130" x2="196" y2="130" stroke="#3b3d42" stroke-width="2" marker-end="url(#fm-arrow)"/>
<rect x="200" y="72" width="160" height="116" rx="10" fill="#eaf0f6" stroke="#274b6d" stroke-width="2"/>
<text x="280" y="108" font-size="13" font-weight="700" fill="#274b6d" text-anchor="middle" letter-spacing="1">MACHINE f</text>
<text x="280" y="142" font-size="20" font-weight="700" fill="#17181b" text-anchor="middle">f(x) = 2x + 1</text>
<text x="280" y="170" font-size="12.5" fill="#6a6d73" text-anchor="middle">double it, then add one</text>
<line x1="364" y1="130" x2="434" y2="130" stroke="#3b3d42" stroke-width="2" marker-end="url(#fm-arrow)"/>
<rect x="438.0" y="104.0" width="92.0" height="52.0" rx="6" fill="#9c6b12" stroke="none"/>
<text x="484.0" y="135.2" font-size="15" font-weight="600" text-anchor="middle" fill="#ffffff">output 7</text>
<text x="30" y="250" font-size="12.5" font-weight="700" fill="#3b3d42">More of the same rule:</text>
<text x="30" y="280" font-size="15" fill="#17181b">f(0) = 1</text>
<text x="162" y="280" font-size="15" fill="#17181b">f(1) = 3</text>
<text x="294" y="280" font-size="15" fill="#17181b">f(3) = 7</text>
<text x="426" y="280" font-size="15" fill="#17181b">f(5) = 11</text>
</svg>